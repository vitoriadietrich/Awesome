<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Pagination Design</title>

            <li class="numb"><a href="#">4</a></li>

            <li class="numb"><a href="#">6</a></li>
            <li class="numb"><a href="#">7</a></li>
            <li class="numb"><a href="#">8</a></li>
            <li class="numb"><a href="#">9</a></li>
            <li class="numb"><a href="#">10</a></li>
            <li class="btn-next"><a href="#">Next <i class="fas fa-chevron-right"></i></a></li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
